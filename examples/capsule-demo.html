<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nape-js — Capsule Shape Demo (P41)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin: 16px 0 4px;
      font-size: 1.4rem;
      color: #00d4ff;
    }
    p.subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }
    canvas {
      border: 1px solid #333;
      border-radius: 6px;
      cursor: crosshair;
    }
    .controls {
      margin: 12px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #16213e;
      color: #00d4ff;
      border: 1px solid #00d4ff44;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    button:hover { background: #0f3460; }
    .info {
      font-size: 0.75rem;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Capsule Shape Demo</h1>
  <p class="subtitle">nape-js P41 — Click to spawn capsules, watch them collide and stack</p>
  <canvas id="canvas" width="800" height="500"></canvas>
  <div class="controls">
    <button id="btnHorizontal">Spawn Horizontal</button>
    <button id="btnVertical">Spawn Vertical</button>
    <button id="btnRandom">Spawn Random</button>
    <button id="btnRain">Capsule Rain</button>
    <button id="btnReset">Reset</button>
  </div>
  <div class="info">Click on the canvas to spawn a capsule at that position</div>

  <script type="module">
    import {
      Space, Body, BodyType, Vec2, Polygon, Circle, Capsule,
      Material, DebugDraw, DebugDrawFlags,
    } from '../dist/index.js';

    // -----------------------------------------------------------------------
    // Setup
    // -----------------------------------------------------------------------
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    let space;
    let bodies = [];

    function initSpace() {
      space = new Space();
      space.gravity = Vec2.get(0, 600);
      bodies = [];

      // Ground
      const ground = new Body(BodyType.STATIC);
      ground.shapes.add(new Polygon(Polygon.rect(0, H - 40, W, 40)));
      space.bodies.add(ground);

      // Left wall
      const leftWall = new Body(BodyType.STATIC);
      leftWall.shapes.add(new Polygon(Polygon.rect(-20, 0, 20, H)));
      space.bodies.add(leftWall);

      // Right wall
      const rightWall = new Body(BodyType.STATIC);
      rightWall.shapes.add(new Polygon(Polygon.rect(W, 0, 20, H)));
      space.bodies.add(rightWall);

      // Some initial capsules
      for (let i = 0; i < 5; i++) {
        spawnCapsule(200 + i * 100, 100, 'random');
      }
    }

    // -----------------------------------------------------------------------
    // Capsule spawning
    // -----------------------------------------------------------------------
    const COLOURS = [
      '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff',
      '#ff9a76', '#a66cff', '#00d4ff', '#ff61d2',
    ];

    function spawnCapsule(x, y, orientation = 'random') {
      const w = 40 + Math.random() * 60;
      const h = 20 + Math.random() * 20;
      const mat = new Material(0.4, 0.6, 0.8, 1.0, 0.001);

      let body;
      if (orientation === 'horizontal') {
        body = Capsule.create(w + h, h, mat);
      } else if (orientation === 'vertical') {
        body = Capsule.createVertical(h, w + h, mat);
      } else {
        // Random
        if (Math.random() > 0.5) {
          body = Capsule.create(w + h, h, mat);
        } else {
          body = Capsule.createVertical(h, w + h, mat);
        }
      }

      body.position.setxy(x, y);
      body.rotation = Math.random() * Math.PI * 2;
      body.velocity.setxy(
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 100,
      );
      space.bodies.add(body);

      bodies.push({
        body,
        colour: COLOURS[Math.floor(Math.random() * COLOURS.length)],
      });
    }

    // -----------------------------------------------------------------------
    // Rendering
    // -----------------------------------------------------------------------
    function drawBody(entry) {
      const { body, colour } = entry;
      const px = body.position.x;
      const py = body.position.y;
      const rot = body.rotation;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(rot);

      ctx.fillStyle = colour + '55';
      ctx.strokeStyle = colour;
      ctx.lineWidth = 1.5;

      // Draw each shape
      for (let i = 0; i < body.shapes.length; i++) {
        const shape = body.shapes.at(i);
        if (shape.isCircle()) {
          const circle = shape.castCircle;
          const cx = shape.localCOM.x;
          const cy = shape.localCOM.y;
          const r = circle.radius;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        } else if (shape.isPolygon()) {
          const poly = shape.castPolygon;
          const verts = poly.localVerts;
          if (verts.length > 0) {
            ctx.beginPath();
            const v0 = verts.at(0);
            ctx.moveTo(v0.x, v0.y);
            for (let j = 1; j < verts.length; j++) {
              const v = verts.at(j);
              ctx.lineTo(v.x, v.y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function drawGround() {
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(0, H - 40, W, 40);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(0, H - 40, W, 40);
    }

    function render() {
      ctx.clearRect(0, 0, W, H);

      // Background grid
      ctx.strokeStyle = '#ffffff08';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      drawGround();

      for (const entry of bodies) {
        drawBody(entry);
      }

      // HUD
      ctx.fillStyle = '#666';
      ctx.font = '12px monospace';
      ctx.fillText(`Bodies: ${bodies.length}`, 10, 20);
    }

    // -----------------------------------------------------------------------
    // Game loop
    // -----------------------------------------------------------------------
    function loop() {
      space.step(1 / 60);

      // Remove bodies that fell off screen
      bodies = bodies.filter((e) => {
        if (e.body.position.y > H + 200) {
          space.bodies.remove(e.body);
          return false;
        }
        return true;
      });

      render();
      requestAnimationFrame(loop);
    }

    // -----------------------------------------------------------------------
    // Event handlers
    // -----------------------------------------------------------------------
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      spawnCapsule(x, y, 'random');
    });

    document.getElementById('btnHorizontal').addEventListener('click', () => {
      spawnCapsule(W / 2 + (Math.random() - 0.5) * 200, 80, 'horizontal');
    });

    document.getElementById('btnVertical').addEventListener('click', () => {
      spawnCapsule(W / 2 + (Math.random() - 0.5) * 200, 80, 'vertical');
    });

    document.getElementById('btnRandom').addEventListener('click', () => {
      spawnCapsule(W / 2 + (Math.random() - 0.5) * 200, 80, 'random');
    });

    document.getElementById('btnRain').addEventListener('click', () => {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          spawnCapsule(
            100 + Math.random() * (W - 200),
            -20 - Math.random() * 100,
            'random',
          );
        }, i * 100);
      }
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      initSpace();
    });

    // -----------------------------------------------------------------------
    // Start
    // -----------------------------------------------------------------------
    initSpace();
    loop();
  </script>
</body>
</html>
